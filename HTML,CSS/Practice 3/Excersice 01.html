<!DOCTYPE html>
<html>
<head>
   <title>Student Registration Form</title>

   <style>
      body{
      font-family: snas-serif;
	  background-color: #f0f4f8;
	  padding: 40px;
	  margin: 0;
      }
  
     h1{
      color: #1a202c;
      font-size: 1.6rem;
      margin-bottom: 24px;
  
      }
    </style>

</head>

<body>
     <h1><center>Student Registration Form</center></h1>

     <form action="" method="POST">
         <label>Full Name:</label>
		  <input type = "text" name=fname placeholder="Enter Your Full Name"></input><br><br>
		 
		 <label>Email:</label>
		  <input type = "Email" name=address placeholder="yuo@university.edu"></input><br><br>
		
		 
		 <label>Password:</label>
		  <input type = "Password" name=password placeholder="Minimum 8 characters"></input><br><br>
		 
		 <label>Age:</label>
		  <input type = "Number" name=age placeholder="Your Age"></input><br><br>
		 
		 <label>Phone Number:</label>
		  <input type = "tel" name=phoneno placeholder="+94-12-345-6789"></input><br><br>
		 
		 <p>Gender:</p>
		   <input type = "radio" name=gender><label>Male</label></input><br>
		   <input type = "radio" name=gender><label>Female</label></input><br>
		   <input type = "radio" name=gender><label>Prefer not to say</label></input><br><br>
		 
		 <p>Skills:</p>
	      <input type = "checkbox" name=skills><label>HTML</label></input>
	      <input type = "checkbox" name=skills><label>CSS</label></input>
	      <input type = "checkbox" name=skills><label>Java Script</label></input>
		  <input type = "checkbox" name=skills><label>React</label></input><br><br>
		
		
		<label>Years of Study:</label>
		 <select name="year" >
		   <option value="first">1st Year </option>
		   <option value="second">2nd Year </option>
		   <option value="third">3rd Year </option>
		   <option value="fourth"> 4th Year</option>
		 </select><br><br>
		
		
		<label>About you:</label><br>
		  <textarea rows="4"></textarea><br><br>
		
		<input type = "Submit" name=submit ></input><br>
		 
		 
		 
		 
		 
		 
		
		 
     </form>

</body>
</html>
